services:
  redis:
    image: "redis:alpine"
    container_name: videoq-redis
    networks:
      - videoq-network

  postgres:
    image: pgvector/pgvector:pg17
    container_name: videoq-postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - videoq-network

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: videoq-opensearch
    env_file:
      - .env
    environment:
      - discovery.type=${DISCOVERY_TYPE}
      - bootstrap.memory_lock=${BOOTSTRAP_MEMORY_LOCK}
      - OPENSEARCH_JAVA_OPTS=${OPENSEARCH_JAVA_OPTS}
      - DISABLE_INSTALL_DEMO_CONFIG=${DISABLE_INSTALL_DEMO_CONFIG}
      - DISABLE_SECURITY_PLUGIN=${DISABLE_SECURITY_PLUGIN}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    networks:
      - videoq-network

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: videoq-opensearch-dashboards
    env_file:
      - .env
    ports:
      - "5601:5601"
    depends_on:
      - opensearch
    networks:
      - videoq-network

  web:
    build: .
    container_name: videoq-web
    command: gunicorn videoq.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
      - opensearch
    networks:
      - videoq-network

  worker:
    build: .
    container_name: videoq-worker
    command: celery -A videoq worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
      - opensearch
    networks:
      - videoq-network

  stripe-webhook:
    image: stripe/stripe-cli
    container_name: videoq-stripe-webhook
    command: listen --forward-to localhost:8000/stripe/webhook/ --skip-verify
    env_file:
      - .env
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  opensearch_data:

networks:
  videoq-network:
    driver: bridge