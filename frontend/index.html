      <div lang="ja">
        <h1>VideoQ — AI動画ナビゲーター</h1>
        <p>VideoQは、教育者・学習者向けのAI動画学習プラットフォームです。動画をアップロードするとOpenAI Whisperによる高精度な自動文字起こしが行われ、文字起こしテキストを基にしたRAGチャットで動画の内容に自然言語で質問できます。</p>
        <p>OpenAI互換APIエンドポイント（/api/v1/chat/completions）を提供しており、既存のOpenAIクライアントやSDKからそのまま利用できます。Claude DesktopなどのMCPクライアントとの統合にも対応しています。</p>
        <h2>主な機能</h2>
        <ul>
          <li>動画の自動文字起こし（OpenAI Whisper）</li>
          <li>RAGチャット：動画の内容に自然言語で質問</li>
          <li>OpenAI互換APIエンドポイント（/api/v1/chat/completions）</li>
          <li>MCPサーバー統合（Claude Desktop など）</li>
          <li>動画グループとパブリック共有リンク</li>
          <li>教育分析ダッシュボード（キーワードクラウド、質問トレンド）</li>
          <li>日本語・英語のマルチロケール対応</li>
        </ul>
        <p><a href="https://videoq.jp/signup">無料で始める</a> | <a href="https://videoq.jp/docs">開発者ドキュメント</a></p>
      </div>
      <div lang="en">
        <h2>VideoQ — AI Video Navigator</h2>
        <p>VideoQ is an AI-powered video learning platform for educators and learners. Upload your video files to get automatic, high-accuracy transcriptions powered by OpenAI Whisper. Once transcribed, you can ask questions about the video content in natural language through a RAG (Retrieval-Augmented Generation) chat interface grounded in the transcript text.</p>
        <p>VideoQ provides an OpenAI-compatible API endpoint (/api/v1/chat/completions) so you can use any existing OpenAI client or SDK to interact with your video library. It also supports MCP (Model Context Protocol) server integration for use with Claude Desktop and other MCP clients.</p>
        <h2>Key Features</h2>
        <ul>
          <li>Automatic video transcription via OpenAI Whisper</li>
          <li>RAG chat: ask questions about video content in natural language</li>
          <li>OpenAI-compatible API endpoint (/api/v1/chat/completions)</li>
          <li>MCP server integration (Claude Desktop and more)</li>
          <li>Video groups and public share links</li>
          <li>Educational analytics dashboard (keyword cloud, question trends)</li>
          <li>Multi-locale support (Japanese and English)</li>
        </ul>
        <p><a href="https://videoq.jp/signup">Get Started for Free</a> | <a href="https://videoq.jp/docs">Developer Docs</a></p>
